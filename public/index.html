<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Blog API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 3em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1em;
            margin-top: 10px;
        }

        /* Barre de progression */
        .progress-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .progress-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #667eea;
            font-weight: bold;
        }

        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 25px;
            overflow: hidden;
            height: 25px;
        }

        .progress-bar {
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            width: 100%;
            height: 100%;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .step {
            text-align: center;
            flex: 1;
            padding: 8px;
            color: #666;
            font-size: 11px;
        }

        .step.active {
            color: #4caf50;
            font-weight: bold;
        }

        .step.completed {
            color: #4caf50;
        }

        /* Grille à 2 colonnes */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Cartes */
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            border-left: 4px solid #4caf50;
            padding-left: 15px;
        }

        /* Formulaire */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button.delete {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        button.edit {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }

        /* Liste des articles */
        .articles-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .article-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .article-item h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .article-meta {
            color: #888;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .article-content {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .article-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .tag {
            background: #e0e0e0;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 11px;
            color: #555;
        }

        .article-actions {
            display: flex;
            gap: 10px;
        }

        .article-actions button {
            padding: 5px 15px;
            font-size: 12px;
        }

        /* Message */
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            display: none;
        }

        .message.success {
            background: #4caf50;
        }

        .message.error {
            background: #e74c3c;
        }

        /* Barre de recherche */
        .search-section {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-section input {
            flex: 1;
        }

        .search-section button {
            width: auto;
            padding: 12px 20px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
            body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📝 The Article Hub</h1>
            <p>L'élégance de la gestion de contenu</p>
        </div>

        <!-- Barre de progression -->
        <div class="progress-section">
            <div class="progress-title">
                <span>📊 Parcours Acardémique</span>
                <span>8 Etape - 100% complet</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar">100%</div>
            </div>
            <div class="steps">
                <div class="step completed">✓ Création</div>
                <div class="step completed">✓ Niveau</div>
                <div class="step completed">✓ Parcours</div>
                <div class="step completed">✓ Modules</div>
                <div class="step completed">✓ Notes</div>
                <div class="step completed">✓ Sources</div>
                <div class="step completed">✓ Quiz</div>
                <div class="step active">🎯 API</div>
            </div>
        </div>

        <!-- Grille à 2 colonnes -->
        <div class="two-columns">
            <!-- Colonne gauche : Nouvel Article -->
            <div class="card">
                <h2>✍️ Nouelle publication</h2>
                <form id="createForm">
                    <div class="form-group">
                        <label>Titre de la publication *</label>
                        <input type="text" id="titre" placeholder="Mon Premier TP INF222" required>
                    </div>
                    <div class="form-group">
                        <label>Description / Contenu *</label>
                        <textarea id="contenu" placeholder="Bienvenue au premier TP à nos cours en ligne..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Création par (Auteur) *</label>
                        <input type="text" id="auteur" placeholder="Entrez votre nom" required>
                    </div>
                    <div class="form-group">
                        <label>Catégorie</label>
                        <input type="text" id="categorie" placeholder="Sélectionnez un cours">
                    </div>
                    <div class="form-group">
                        <label>Tags (séparés par des virgules)</label>
                        <input type="text" id="tags" placeholder="nodejs, express, api">
                    </div>
                    <div class="form-group">
                        <label>Code TP (optionnel)</label>
                        <input type="text" id="codeTp" placeholder="Entrez le code TP">
                    </div>
                    <button type="submit">📌 Publier l'article</button>
                </form>
            </div>

            <!-- Colonne droite : Articles existants -->
            <div class="card">
                <h2>📚 Articles récents</h2>
                <div class="search-section">
                    <input type="text" id="searchQuery" placeholder="Rechercher un article...">
                    <button onclick="searchArticles()">🔍 Rechercher</button>
                    <button onclick="loadArticles()">⟳ Tous</button>
                </div>
                <div id="articlesList" class="articles-list">
                    <div class="empty-state">Chargement des articles...</div>
                </div>
            </div>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script>
        const API_URL = 'http://localhost:3000/api/articles';

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        async function loadArticles() {
            try {
                const response = await fetch(API_URL);
                const articles = await response.json();
                displayArticles(articles);
            } catch (error) {
                console.error('Erreur:', error);
                showMessage('Erreur de chargement des articles', 'error');
            }
        }

        function displayArticles(articles) {
            const container = document.getElementById('articlesList');
            
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Aucun article pour le moment</div>';
                return;
            }
            
            container.innerHTML = articles.map(article => `
                <div class="article-item" id="article-${article.id}">
                    <h3>${escapeHtml(article.titre)}</h3>
                    <div class="article-meta">
                        👤 ${escapeHtml(article.auteur)} | 📅 ${article.date} | 📁 ${article.categorie || 'Non catégorisé'}
                    </div>
                    <div class="article-content">${escapeHtml(article.contenu.substring(0, 150))}${article.contenu.length > 150 ? '...' : ''}</div>
                    <div class="article-tags">
                        ${article.tags ? article.tags.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('') : '<span class="tag">#aucun tag</span>'}
                    </div>
                    <div class="article-actions">
                        <button class="edit" onclick="editArticle(${article.id})">✏️ Éditer</button>
                        <button class="delete" onclick="deleteArticle(${article.id})">🗑️ Suppr.</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const tagsInput = document.getElementById('tags').value;
            const tags = tagsInput ? tagsInput.split(',').map(t => t.trim()) : [];
            
            const article = {
                titre: document.getElementById('titre').value,
                contenu: document.getElementById('contenu').value,
                auteur: document.getElementById('auteur').value,
                categorie: document.getElementById('categorie').value,
                tags: tags
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(article)
                });
                
                if (response.ok) {
                    showMessage('✅ Article créé avec succès !', 'success');
                    document.getElementById('createForm').reset();
                    loadArticles();
                } else {
                    const error = await response.json();
                    showMessage(error.error || 'Erreur lors de la création', 'error');
                }
            } catch (error) {
                showMessage('❌ Erreur de connexion au serveur', 'error');
            }
        });

        async function deleteArticle(id) {
            if (confirm('Voulez-vous vraiment supprimer cet article ?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        showMessage('🗑️ Article supprimé avec succès', 'success');
                        loadArticles();
                    } else {
                        showMessage('Erreur lors de la suppression', 'error');
                    }
                } catch (error) {
                    showMessage('Erreur de connexion', 'error');
                }
            }
        }

        async function editArticle(id) {
            const nouveauTitre = prompt('Nouveau titre :');
            const nouveauContenu = prompt('Nouveau contenu :');
            
            if (nouveauTitre && nouveauContenu) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ titre: nouveauTitre, contenu: nouveauContenu })
                    });
                    if (response.ok) {
                        showMessage('✏️ Article modifié avec succès', 'success');
                        loadArticles();
                    } else {
                        showMessage('Erreur lors de la modification', 'error');
                    }
                } catch (error) {
                    showMessage('Erreur de connexion', 'error');
                }
            }
        }

        async function searchArticles() {
            const query = document.getElementById('searchQuery').value;
            if (!query) {
                loadArticles();
                return;
            }
            try {
                const response = await fetch(`${API_URL}/search?query=${encodeURIComponent(query)}`);
                const articles = await response.json();
                displayArticles(articles);
            } catch (error) {
                showMessage('Erreur de recherche', 'error');
            }
        }

        // Charger les articles au démarrage
        loadArticles();
    </script>
</body>
</html>
